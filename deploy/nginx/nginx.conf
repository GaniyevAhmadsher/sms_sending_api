worker_processes auto;
events { worker_connections 2048; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request","status":$status,"body_bytes":$body_bytes_sent,"request_time":$request_time,"upstream_time":"$upstream_response_time","xff":"$http_x_forwarded_for"}';
  access_log /var/log/nginx/access.log json_combined;

  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

  upstream sms_api {
    server api:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
      limit_req zone=api_limit burst=100 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";
      proxy_read_timeout 75s;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_pass http://sms_api;
    }
  }
}
